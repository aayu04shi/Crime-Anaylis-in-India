name: Auto Update Leaderboard

on:
  push:
    paths:
      - 'submissions/*.csv'

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install pandas
        run: pip install pandas

      - name: Run leaderboard script
        run: python update_leaderboard_auto.py

      - name: Commit changes
        run: |
          git config --global user.name "actions-user"
          git config --global user.email "actions@github.com"
          git add leaderboard.csv
          git commit -m "Auto update leaderboard" || echo "No changes"
          git push
          