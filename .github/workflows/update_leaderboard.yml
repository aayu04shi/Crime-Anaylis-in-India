name: Auto Leaderboard

on:
  push:
    branches: [main]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas

      - name: Run leaderboard script
        run: python update_leaderboard.py

      - name: Commit and push changes
        run: |
          git config --global user.name "leaderboard-bot"
          git config --global user.email "bot@example.com"
          git add leaderboard.json README.md
          git commit -m "update leaderboard" || echo "no changes"
          git push
