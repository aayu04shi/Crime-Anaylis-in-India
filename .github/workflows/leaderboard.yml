name: Update Leaderboard

on:
  pull_request:
    types: [closed]
permissions:
  contents: write

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Read results
        run: |
          acc=$(grep 'accuracy' results.txt | cut -d ':' -f2)
          f1=$(grep 'f1_score' results.txt | cut -d ':' -f2)
          echo "ACC=$acc" >> $GITHUB_ENV
          echo "F1=$f1" >> $GITHUB_ENV

      - name: Update leaderboard
        run: |
          echo "| ${{ github.actor }} | $ACC | $F1 |" >> leaderboard.md
          sort -r -k2 leaderboard.md -o leaderboard.md

      - name: Commit & push
  run: |
     git config --global user.name "github-actions"
     git config --global user.email "actions@github.com"
     git add leaderboard.md
     git commit -m "Updated leaderboard" || echo "No changes"
     git push
