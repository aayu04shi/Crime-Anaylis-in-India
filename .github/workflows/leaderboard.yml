name: Update Leaderboard

on:
  pull_request:
    types: [opened, synchronize, closed]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        - name: Install dependencies
  run: pip install -r requirements.txt

- name: Run model
  run: python main.py

    -  steps:
  - uses: actions/checkout@v3

  - name: Install dependencies
    run: pip install -r requirements.txt

  - name: Run model
    run: python main.py

  - name: Read results
    run: |
      acc=$(grep 'accuracy' results.txt | cut -d ':' -f2)
      f1=$(grep 'f1_score' results.txt | cut -d ':' -f2)
      echo "ACC=$acc" >> $GITHUB_ENV
      echo "F1=$f1" >> $GITHUB_ENV
          else
            echo "No results.txt found"
          fi

      - name: Update leaderboard
        run: |
          echo "| ${{ github.actor }} | $ACC | $F1 |" >> leaderboard.md

      - name: Commit & push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add leaderboard.md
          git commit -m "Updated leaderboard" || echo "No changes"
          git push
