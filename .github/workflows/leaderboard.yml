name: Auto Leaderboard

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  evaluate-and-update:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run model
        run: python main.py

      - name: Read results
        run: |
          acc=$(grep 'accuracy' results.txt | cut -d ':' -f2)
          f1=$(grep 'f1_score' results.txt | cut -d ':' -f2)
          echo "ACC=$acc" >> $GITHUB_ENV
          echo "F1=$f1" >> $GITHUB_ENV

      - name: Update leaderboard
        run: |
          echo "| ${{ github.actor }} | $ACC | $F1 |" >> leaderboard.md

      - name: Commit & push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add leaderboard.md
          git commit -m "Auto update leaderboard" || echo "No changes"
          git push
